user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # =========================
    # 🔥 RATE LIMITING
    # =========================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=run_limit:10m rate=5r/s;

    # =========================
    # 🔗 UPSTREAMS
    # =========================
    upstream backend {
        server backend:3000;
    }

    upstream runner {
        server runner:4000;
    }

    # =========================
    # 🌐 ALLOWED ORIGINS (CORS)
    # =========================
    map $http_origin $cors_origin {
        default "";
        ~^https://training-placements\.onrender\.com$ $http_origin;
        ~^https://runme\.qzz\.io$ $http_origin;
        ~^http://localhost(:[0-9]+)?$ $http_origin;
        ~^chrome-extension:// $http_origin;
    }

    server {
        listen 80;
        server_name _;

        # =========================
        # ❤️ HEALTH CHECK - RUNNER
        # =========================
        location /runner-health {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

            # if ($request_method = 'OPTIONS') {
            #     return 204;
            # }

            proxy_pass http://runner;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =========================
        # ❤️ HEALTH CHECK - BACKEND
        # =========================
        location /health {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

            # if ($request_method = 'OPTIONS') {
            #     return 204;
            # }

            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =========================
        # ⚡ RUN CODE ENDPOINT
        # =========================
        location /practice/run-code {

            # 🚦 Rate limit (5 req/sec per IP)
            limit_req zone=run_limit burst=10 nodelay;

            # 🔒 Block unknown origins (STRICT)
            if ($cors_origin = "") {
                return 403;
            }

            # 🌐 CORS
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

            # 🔄 Preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            # 🔁 Proxy to backend
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ⏱️ Timeouts (important for code execution)
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}