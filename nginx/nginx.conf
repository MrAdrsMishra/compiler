user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging (Enhanced for Cloudflare)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" CF_RAY: "$http_cf_ray"';

    access_log /var/log/nginx/access.log main;

    # Performance & Scalability
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # =========================
    # ☁️ CLOUDFLARE REAL IP
    # =========================
    # Cloudflare IPv4
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    # Cloudflare IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    real_ip_header CF-Connecting-IP;

    # =========================
    # 🔥 RATE LIMITING (Per-User)
    # =========================
    # Use $binary_remote_addr (now extracted from CF-Connecting-IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=run_limit:10m rate=5r/s;

    # =========================
    # 🔗 UPSTREAMS
    # =========================
    upstream backend {
        server backend:3000;
    }

    upstream runner {
        server runner:4000;
    }

    # =========================
    # 🌐 ALLOWED ORIGINS (CORS)
    # =========================
    map $http_origin $cors_origin {
        default "";
        ~^https://training-placements\.onrender\.com$ $http_origin;
        ~^https://onlinecompiler.me$ $http_origin;
        ~^https://apius.reqbin.com$ $http_origin;
        ~^chrome-extension:// $http_origin;
    }
    server {
        listen 80;
        server_name _;

        # =========================
        # ❤️ HEALTH CHECK - RUNNER
        # =========================
        location /runner-health {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

            # if ($request_method = 'OPTIONS') {
            #     return 204;
            # }

            proxy_pass http://runner;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =========================
        # ❤️ HEALTH CHECK - BACKEND
        # =========================
        location /health {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

            # if ($request_method = 'OPTIONS') {
            #     return 204;
            # }

            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =========================
        # ⚡ RUN CODE ENDPOINT
        # =========================
        location /practice/run-code {

            # 🚦 Rate limit (5 req/sec per IP)
            limit_req zone=run_limit burst=10 nodelay;

            # 🔒 Block unknown origins (STRICT)
            # 🔒 Block unknown origins (Robust Logic)
            set $allow_request 0;
            
            # Allow browser-less requests (no Origin header)
            if ($http_origin = "") {
                set $allow_request 1;
            }
            
            # Allow whitelisted origins from the map
            if ($cors_origin != "") {
                set $allow_request 1;
            }
            
            # Reject if Origin is present but unauthorized
            if ($allow_request = 0) {
                add_header X-Debug-Origin "$http_origin" always;
                add_header X-Debug-Cors "$cors_origin" always;
                return 403;
            }
            # 🌐 CORS
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

            # 🔄 Preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            # 🔁 Proxy to backend
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ⏱️ Timeouts (important for code execution)
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}